<!DOCTYPE html>
<html lang="zh-Hant" class="">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily AI Insights · Captain Balung</title>
<meta name="description" content="AI 產業每日決策情報 — 由 Captain Balung 主編的全自動化情報系統">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          primary: '#1A2B3C',
          accent: '#E63946',
          finance: '#2A9D8F',
          policy: '#F4A261',
          dark: {
            bg: '#0D1117',
            card: '#161B22',
            text: '#E8EEF4',
            accent: '#FF6B6B',
            finance: '#3DDC97',
            policy: '#FFB570'
          }
        }
      }
    }
  }
</script>
<style>
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }
  details[open] > summary .chev { transform: rotate(90deg); }
  .chev { transition: transform .2s; }
</style>
</head>
<body class="bg-gray-50 dark:bg-dark-bg text-primary dark:text-dark-text min-h-screen font-sans">

<header class="bg-primary dark:bg-dark-card text-white">
  <div class="max-w-4xl mx-auto px-4 py-6 flex items-center justify-between">
    <div>
      <div class="text-xs tracking-[0.3em] opacity-70">DAILY AI INSIGHTS · CAPTAIN BALUNG</div>
      <h1 class="text-2xl md:text-3xl font-bold mt-1">AI 產業每日決策情報</h1>
    </div>
    <div class="flex gap-2 items-center">
      <select id="dateSelect" class="bg-white/10 border border-white/20 text-white text-sm rounded px-2 py-1"></select>
      <button id="themeToggle" class="text-xl" aria-label="切換主題">🌓</button>
    </div>
  </div>
</header>

<main class="max-w-4xl mx-auto px-4 py-6">

  <!-- Dashboard -->
  <section id="dashboard" class="mb-6 hidden bg-white dark:bg-dark-card rounded-xl p-4 shadow-sm border-l-4 border-finance dark:border-dark-finance">
    <div class="text-xs uppercase tracking-wider text-gray-500 mb-2">📊 今日看板</div>
    <div id="dashboardGrid" class="flex flex-wrap gap-x-6 gap-y-2 text-sm"></div>
  </section>

  <!-- Meta -->
  <div id="meta" class="mb-4 text-xs text-gray-500 dark:text-gray-400"></div>

  <!-- Sections -->
  <div id="content" class="space-y-6"></div>

  <!-- Empty / Error -->
  <div id="empty" class="hidden text-center py-12 text-gray-400">
    <div class="text-4xl mb-2">📭</div>
    <p>尚無資料,請稍候系統首次產製。</p>
  </div>

</main>

<footer class="max-w-4xl mx-auto px-4 py-8 text-center text-xs text-gray-500 dark:text-gray-400">
  Daily AI Insights · Generated by Gemini · <a class="underline" href="https://github.com/captain-balung/20260512-newsCollector-gemini">GitHub Repo</a>
</footer>

<script src="./app.js"></script>
</body>
</html>
